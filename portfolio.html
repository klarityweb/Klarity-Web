<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Klarity Web</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Roboto', sans-serif;
    background:#000;
    color:#fff;
}

/* NAVBAR (lasciata invariata) */
.navbar{
    background: rgba(0,0,0,0.95);
    padding:15px 0;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid #111;
}
.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
}

/* HERO */
.portfolio-hero{
    text-align:center;
    padding:100px 20px 60px;
    background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=1600&q=80') center/cover;
}
.portfolio-hero h1{
    font-size:2.6rem;
    text-transform:uppercase;
}

/* FILTER BUTTONS */
.filters{
    text-align:center;
    margin:40px 0;
}
.filters button{
    background:#111;
    border:1px solid #222;
    color:#aaa;
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
    transition:0.3s;
    border-radius:6px;
}
.filters button:hover,
.filters button.active{
    background:#fff;
    color:#000;
}

/* GRID */
.portfolio-grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
    padding:0 20px 80px;
}

/* CARD */
.portfolio-card{
    position:relative;
    overflow:hidden;
    border-radius:16px;
    cursor:pointer;
    transform:translateY(30px);
    opacity:0;
    transition:0.6s ease;
}

.portfolio-card img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:0.5s;
}

/* hover */
.portfolio-card:hover img{
    transform:scale(1.08);
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:15px;
    opacity:0;
    transition:0.4s;
}

.portfolio-card:hover .overlay{
    opacity:1;
}

/* ANIMATION ON SCROLL */
.show{
    transform:translateY(0);
    opacity:1;
}

/* LIGHTBOX */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-container">
    <div><a href="index.html" style="color:#fff;">Klarity</a></div>
    <ul style="display:flex;gap:20px;list-style:none;">
      <li><a href="index.html" style="color:#aaa;">Home</a></li>
      <li><a href="portfolio.html" style="color:#fff;">Portfolio</a></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<section class="portfolio-hero">
  <h1>Unser Portfolio</h1>
</section>

<!-- FILTERS -->
<div class="filters">
  <button class="active" onclick="filter('all')">All</button>
  <button onclick="filter('web')">Web</button>
  <button onclick="filter('seo')">SEO</button>
  <button onclick="filter('ecom')">E-Commerce</button>
</div>

<!-- GRID -->
<section class="portfolio-grid">

  <div class="portfolio-card web" onclick="openLightbox(this)">
    <img src="images/portfolio/01.png">
    <div class="overlay"><h3>Website 01</h3></div>
  </div>

  <div class="portfolio-card seo" onclick="openLightbox(this)">
    <img src="images/portfolio/02.png">
    <div class="overlay"><h3>Website 02</h3></div>
  </div>

  <div class="portfolio-card ecom" onclick="openLightbox(this)">
    <img src="images/portfolio/03.png">
    <div class="overlay"><h3>Website 03</h3></div>
  </div>

  <!-- continua fino a 20 -->

</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>

// scroll animation
const cards = document.querySelectorAll('.portfolio-card');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

cards.forEach(card => observer.observe(card));

// filter
function filter(category){
  let items = document.querySelectorAll('.portfolio-card');
  items.forEach(item => {
    if(category === 'all'){
      item.style.display = 'block';
    } else {
      item.style.display = item.classList.contains(category) ? 'block' : 'none';
    }
  });
}

// lightbox
function openLightbox(el){
  document.getElementById('lightbox').style.display = 'flex';
  document.getElementById('lightbox-img').src = el.querySelector('img').src;
}

function closeLightbox(){
  document.getElementById('lightbox').style.display = 'none';
}

</script>

</body>
</html>
