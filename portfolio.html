<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | Klarity Web</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

.portfolio-hero{
    text-align:center;
    padding:100px 20px;
}

.portfolio-grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    padding:0 20px 80px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:14px;
    transition:0.3s;
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
    transition:0.4s;
}

.card:hover img{
    transform:scale(1.08);
}

.card span{
    position:absolute;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:5px 10px;
    font-size:12px;
}
</style>
</head>

<body>

<section class="portfolio-hero">
<h1>Unser Portfolio</h1>
</section>

<section class="portfolio-grid">

<div class="card"><img src="images/portfolio/01.png"><span>Website 01</span></div>
